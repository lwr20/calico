version: v1.0

name: E2E GCP

agent:
  machine:
    type: c1-standard-1
    os_image: ubuntu2204

execution_time_limit:
  hours: 6

global_job_config:
  prologue:
    commands_file: ../scripts/global_prologue.sh
  epilogue:
    always:
      commands:
        - ~/calico/.semaphore/end-to-end/scripts/global_epilogue.sh
  secrets:
    - name: marvin-github-ssh-private-key
    - name: banzai-secrets
  env_vars:
    - name: TEST_TYPE
      value: k8s-e2e
    - name: PRODUCT
      value: calico
    - name: FUNCTIONAL_AREA
      value: "e2e-gcp.yml"
    - name: RUN_LOCAL_TESTS
      value: "true"
    - name: USE_PRIVATE_REGISTRY
      value: "true"
    - name: PRIVATE_REGISTRY
      value: "quay.io/"
    - name: K8S_E2E_FLAGS
      value: --ginkgo.focus=(\[sig-calico\]) --ginkgo.skip=(\[Slow\]|\[Disruptive\])
    - name: USE_API_SERVER
      value: "false"
    - name: INSTALLER
      value: operator
    - name: DATAPLANE
      value: CalicoBPF
    - name: K8S_VERSION
      value: stable
    - name: PROVISIONER
      value: gcp-kubeadm

blocks:
  - name: "E2E tests on GCP kubeadm (local binary)"
    dependencies: []
    task:
      jobs:
        - name: gcp-kubeadm - e2e local binary
          execution_time_limit:
            hours: 3
          commands:
            - ~/calico/.semaphore/end-to-end/scripts/body_standard.sh
